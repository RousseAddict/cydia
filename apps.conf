# Cydia repo app manifest.
# One app per line, pipe-separated:  repo|package|name|section|description
# - repo    : GitHub repo name under the owner (CYDIA_OWNER, default RousseAddict)
#             that contains build/<something>.ipa
# - package : reverse-DNS package id
# - name    : display name in Cydia
# - section : Cydia section
# Lines starting with # are ignored.
oldpipe|rousseaddict.oldpipe|oldPipe|Multimedia|Video streaming client for legacy iOS
stoatold|rousseaddict.stoatold|stoatOld|Applications|stoat for legacy iOS
podcold|rousseaddict.podcold|podCold|Multimedia|Podcast client for legacy iOS
jellyold|rousseaddict.jellyold|jellyOld|Multimedia|Jellyfin client for legacy iOS
cai|rousseaddict.cai|cAI|Applications|AI assistant (chat + remote tmux session) for legacy iOS
reddiold|rousseaddict.reddiold|reddiOld|Applications|Reddit client for legacy iOS
elementold|rousseaddict.elementold|elementOld|Applications|Element (Matrix) client for legacy iOS
